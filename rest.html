<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>该休息一下了</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8faf7;
      --ink: #18211b;
      --muted: #5d6a62;
      --line: #cbd7ce;
      --primary: #136f63;
      --primary-hover: #0d5a50;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    main {
      width: min(100%, 360px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .summary {
      margin: 18px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .summary strong {
      display: block;
      margin-bottom: 4px;
      font-size: 20px;
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    button.primary:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <main>
    <h1>该休息一下了</h1>
    <p>站起来活动一下，喝口水，让眼睛离开屏幕一会儿。</p>

    <section class="summary" aria-live="polite">
      <strong id="active-minutes">已活跃 0 分钟</strong>
      <p id="break-minutes">建议休息 5 分钟</p>
    </section>

    <div class="actions">
      <button class="primary" id="start-break">开始休息</button>
      <button id="snooze">稍后 5 分钟</button>
      <button id="skip">跳过本次</button>
    </div>
  </main>

  <script>
    const activeMinutes = document.querySelector('#active-minutes');
    const breakMinutes = document.querySelector('#break-minutes');
    const startBreak = document.querySelector('#start-break');
    const snooze = document.querySelector('#snooze');
    const skip = document.querySelector('#skip');

    function render(state) {
      if (!state) return;
      activeMinutes.textContent = `已活跃 ${formatMinutes(state.accumulatedMs)} 分钟`;
      breakMinutes.textContent = `建议休息 ${formatMinutes(state.settings.breakMs)} 分钟`;
      snooze.textContent = `稍后 ${formatMinutes(state.settings.snoozeMs)} 分钟`;
    }

    function formatMinutes(ms) {
      return Math.max(1, Math.round((Number(ms) || 0) / 60000));
    }

    if (window.electronAPI) {
      window.electronAPI.getReminderState().then(render).catch(() => {});
      window.electronAPI.subscribeReminderState(render);
      startBreak.addEventListener('click', () => window.electronAPI.startBreak());
      snooze.addEventListener('click', () => window.electronAPI.snooze());
      skip.addEventListener('click', () => window.electronAPI.skipOnce());
    }
  </script>
</body>
</html>
