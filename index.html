<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>久坐提醒</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f3;
      --surface: #ffffff;
      --ink: #17201a;
      --muted: #617066;
      --line: #cfd8d1;
      --primary: #176f5d;
      --primary-hover: #105849;
      --danger: #b42318;
      --warning: #a15c07;
      --track: #e5ebe6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(100%, 680px);
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .phase {
      min-width: 112px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      font-weight: 700;
    }

    section {
      margin-bottom: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .progress-head,
    .row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .progress-title {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .progress-value {
      font-size: 24px;
      font-weight: 760;
    }

    .bar {
      height: 12px;
      margin-top: 14px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
    }

    .bar span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--primary);
      transition: width 180ms ease;
    }

    .status {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
    }

    input:focus {
      outline: 2px solid rgba(23, 111, 93, 0.2);
      border-color: var(--primary);
    }

    .actions {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--primary);
    }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    button.primary:hover {
      background: var(--primary-hover);
    }

    button.danger {
      color: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 620px) {
      main {
        padding: 18px;
      }

      header,
      .progress-head,
      .row {
        display: grid;
      }

      .grid,
      .actions {
        grid-template-columns: 1fr;
      }

      .phase {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>久坐提醒</h1>
        <p>按固定间隔提醒起身，只有离开电脑完成休息，才累计到今日目标。</p>
      </div>
      <div class="phase" id="phase">未开始</div>
    </header>

    <section>
      <div class="progress-head">
        <div>
          <div class="progress-title">今日有效休息</div>
          <div class="progress-value" id="daily-value">0 / 30 分钟</div>
        </div>
        <div class="progress-title" id="today-key">今天</div>
      </div>
      <div class="bar" aria-hidden="true"><span id="daily-bar"></span></div>
      <div class="status" id="status">设置目标后开始。</div>
    </section>

    <section>
      <div class="grid">
        <label>
          多久提醒一次（分钟）
          <input id="interval" type="number" min="1" max="240" step="1">
        </label>
        <label>
          每次有效休息（分钟）
          <input id="rest-block" type="number" min="1" max="60" step="1">
        </label>
        <label>
          每日休息目标（分钟）
          <input id="daily-goal" type="number" min="1" max="480" step="1">
        </label>
        <label>
          稍后提醒（分钟）
          <input id="snooze" type="number" min="1" max="60" step="1">
        </label>
        <label>
          离开电脑判定（秒）
          <input id="idle-confirm" type="number" min="5" max="120" step="1">
        </label>
      </div>
      <p class="note">休息期间一旦动键盘或鼠标，本次有效休息计时会重置。</p>
    </section>

    <section>
      <div class="actions">
        <button class="primary" id="primary">开始提醒</button>
        <button id="save">保存设置</button>
        <button class="danger" id="stop">停止</button>
      </div>
      <div class="actions" style="margin-top: 10px;">
        <button id="reset-today">重置今日目标</button>
        <button id="show-rest">测试休息弹窗</button>
        <button id="skip" disabled>跳过本次</button>
      </div>
    </section>
  </main>

  <script>
    const api = window.electronAPI;
    const els = {
      phase: document.querySelector('#phase'),
      dailyValue: document.querySelector('#daily-value'),
      dailyBar: document.querySelector('#daily-bar'),
      todayKey: document.querySelector('#today-key'),
      status: document.querySelector('#status'),
      interval: document.querySelector('#interval'),
      restBlock: document.querySelector('#rest-block'),
      dailyGoal: document.querySelector('#daily-goal'),
      snooze: document.querySelector('#snooze'),
      idleConfirm: document.querySelector('#idle-confirm'),
      primary: document.querySelector('#primary'),
      save: document.querySelector('#save'),
      stop: document.querySelector('#stop'),
      resetToday: document.querySelector('#reset-today'),
      showRest: document.querySelector('#show-rest'),
      skip: document.querySelector('#skip')
    };

    let latestState = null;

    function minutes(ms) {
      return Math.max(0, Math.round((Number(ms) || 0) / 60000));
    }

    function clock(ms) {
      const total = Math.max(0, Math.round((Number(ms) || 0) / 1000));
      const m = Math.floor(total / 60);
      const s = String(total % 60).padStart(2, '0');
      return `${m}:${s}`;
    }

    function setInputValue(input, value) {
      if (document.activeElement !== input) {
        input.value = value;
      }
    }

    function phaseLabel(phase) {
      return {
        idle: '未开始',
        work: '计时中',
        prompt: '待休息',
        resting: '休息中',
        paused: '已暂停',
        completed: '今日完成'
      }[phase] || phase;
    }

    function statusText(state) {
      if (state.phase === 'idle') {
        return '设置提醒间隔和每日目标后开始。';
      }
      if (state.phase === 'paused') {
        return `已暂停。今日还差 ${minutes(state.dailyRemainingMs)} 分钟有效休息。`;
      }
      if (state.phase === 'work') {
        return `距离下次提醒 ${clock(state.remainingMs)}。本轮已工作 ${minutes(state.workElapsedMs)} 分钟。`;
      }
      if (state.phase === 'prompt') {
        return `休息提醒已弹出。本次需要完成 ${minutes(state.settings.restBlockMs)} 分钟有效休息。`;
      }
      if (state.phase === 'resting') {
        if (!state.idleEnough) {
          return `检测到你仍在使用电脑。离开电脑 ${state.settings.idleConfirmSec} 秒后，本次休息重新开始累计。`;
        }
        return `有效休息中，本次还差 ${clock(state.restRemainingMs)}。`;
      }
      if (state.phase === 'completed') {
        return '今日有效休息目标已完成。';
      }
      return '';
    }

    function render(state) {
      latestState = state;
      const settings = state.settings;

      els.phase.textContent = phaseLabel(state.phase);
      els.dailyValue.textContent = `${minutes(state.todayRestMs)} / ${minutes(settings.dailyGoalMs)} 分钟`;
      els.dailyBar.style.width = `${Math.round((state.dailyProgress || 0) * 100)}%`;
      els.todayKey.textContent = state.todayKey;
      els.status.textContent = statusText(state);

      setInputValue(els.interval, minutes(settings.intervalMs));
      setInputValue(els.restBlock, minutes(settings.restBlockMs));
      setInputValue(els.dailyGoal, minutes(settings.dailyGoalMs));
      setInputValue(els.snooze, minutes(settings.snoozeMs));
      setInputValue(els.idleConfirm, settings.idleConfirmSec);

      const running = state.phase === 'work' || state.phase === 'prompt' || state.phase === 'resting';
      els.primary.textContent = running ? '暂停提醒' : '开始提醒';
      els.stop.disabled = state.phase === 'idle';
      els.skip.disabled = !(state.phase === 'prompt' || state.phase === 'resting');
      els.showRest.disabled = state.phase === 'completed';
    }

    function readSettings() {
      return {
        intervalMinutes: Number(els.interval.value || 45),
        restBlockMinutes: Number(els.restBlock.value || 5),
        dailyGoalMinutes: Number(els.dailyGoal.value || 30),
        snoozeMinutes: Number(els.snooze.value || 5),
        idleConfirmSec: Number(els.idleConfirm.value || 15)
      };
    }

    async function saveSettings() {
      render(await api.updateReminderSettings(readSettings()));
    }

    els.primary.addEventListener('click', async () => {
      await saveSettings();
      const state = latestState;
      const running = state.phase === 'work' || state.phase === 'prompt' || state.phase === 'resting';
      render(await (running ? api.pauseTracking() : api.startTracking()));
    });

    els.save.addEventListener('click', saveSettings);
    els.stop.addEventListener('click', async () => render(await api.stopTracking()));
    els.resetToday.addEventListener('click', async () => render(await api.resetToday()));
    els.showRest.addEventListener('click', async () => {
      await saveSettings();
      render(await api.skipOnce());
      render(await api.startTracking());
      render(await api.updateReminderSettings({ intervalMs: 1000 }));
    });
    els.skip.addEventListener('click', async () => render(await api.skipOnce()));

    if (api) {
      api.subscribeReminderState(render);
      api.getReminderState().then(render).catch(() => {});
    }
  </script>
</body>
</html>
